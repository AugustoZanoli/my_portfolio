<section class="blog section">
  <div class="container">
    <div class="blog_header animate-fade-up">
      <h1 class="display-lg">Blog</h1>
      <p class="text-lg text-muted">
        Artigos e reflexões sobre desenvolvimento, tecnologia e carreira.
      </p>
    </div>

    <div class="blog_filters">
      <button
        *ngFor="let tag of allTags"
        class="filter-btn"
        [class.is-active]="activeTag === tag"
        (click)="setTag(tag)"
      >
        {{ tag }}
      </button>
    </div>

    <div class="blog_list">
  <a
    *ngFor="let post of filteredPosts"
    [href]="post.url"
    target="_blank"
    rel="noopener"
    class="post-card card"
  >
    <div class="post-card_meta">
      <span class="tag tag-accent source">
        <i [class]="post.source.icon"></i>
      </span>

      <div class="meta-right">
        <span class="text-xs text-muted">
          {{ formatDate(post.date) }}
        </span>
        <span class="text-xs text-muted dot">•</span>
        <span class="text-xs text-muted">
          {{ post.readTime }}
        </span>
      </div>
    </div>

    <h2 class="post-card_title font-medium">
      {{ post.title }}
    </h2>

    <p class="post-card_summary text-sm text-muted">
      {{ post.summary }}
    </p>

    <div class="post-card_footer">
      <div class="post-card_tags">
        <span *ngFor="let tag of post.tags" class="tag">
          {{ tag }}
        </span>
      </div>

      <span class="post-card_link">
        Ler →
      </span>
    </div>
  </a>
</div>
  </div>
</section>
